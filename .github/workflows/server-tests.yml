name: "Server tests"
on:
  pull_request:
    paths:
      - 'server/**'
      - '.github/workflows/server-tests.yml'
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/server-tests.yml'
jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Sync dependencies (locked)
        working-directory: server
        run: uv sync --locked
      - name: Run pytest
        working-directory: server
        run: uv run pytest test/ -v
