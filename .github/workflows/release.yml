name: Build and Release LrGeniusAI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      breaking_changes:
        description: 'Mark release as requiring full installer (dependency changes)'
        type: boolean
        default: false

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    name: Validate tag is on main
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Ensure tag commit is on main
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_SHA="${GITHUB_SHA}"
          git fetch origin main
          if git branch -r --contains "$TAG_SHA" | grep -q "origin/main"; then
            echo "Tag commit is contained in origin/main."
          else
            echo "Error: Tag commit is not contained in origin/main."
            exit 1
          fi

  build-and-release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [validate-tag]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os_name: windows
            arch: x64
          - os: macos-latest
            os_name: macos
            arch: arm64

    name: Build LrGeniusAI - ${{ matrix.os_name }}-${{ matrix.arch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update Info.lua with version and build date
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          REVISION=$(echo "$VERSION" | cut -d. -f3)
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          REVISION=${REVISION:-0}
          BUILD_DATE=$(date +%Y%m%d)
          INFO_LUA="plugin/LrGeniusAI.lrdevplugin/Info.lua"
          sed 's/Info.MAJOR = .*/Info.MAJOR = '"$MAJOR"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          sed 's/Info.MINOR = .*/Info.MINOR = '"$MINOR"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          sed 's/Info.REVISION = .*/Info.REVISION = '"$REVISION"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          sed 's/Info.BUILD = [0-9]*/build = '"$BUILD_DATE"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          echo "Updated Info.lua: MAJOR=$MAJOR MINOR=$MINOR REVISION=$REVISION build=$BUILD_DATE"

      - name: Update backend version info from tag
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          BUILD_DATE=$(date +%Y%m%d)
          VERSION_FILE="server/src/version_info.py"
          cat > "$VERSION_FILE" <<EOF
          BACKEND_VERSION = "${VERSION}"
          BACKEND_RELEASE_TAG = "v${VERSION}"
          BACKEND_BUILD = ${BUILD_DATE}
          EOF
          echo "Updated backend version info: version=${VERSION} build=${BUILD_DATE}"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build backend runtime
        shell: bash
        run: |
          set -euo pipefail
          BUILD_DIR="build"
          SERVER_DIR="$BUILD_DIR/lrgenius-server"
          SERVER_APP_DIR="$SERVER_DIR/app"
          SERVER_ENV_DIR="$SERVER_DIR/env"
          mkdir -p "$SERVER_APP_DIR"

          # On macOS and Windows, bundle the full uv-managed interpreter so the artifact does
          # not reference runner-local installs (macOS: Framework Python; Windows: Actions
          # toolcache / pyvenv.cfg home paths).
          if [ "${{ matrix.os_name }}" == "macos" ]; then
            uv python install 3.12
            UV_MANAGED_PY="$(uv python find --managed-python --resolve-links 3.12)"
            echo "Using uv-managed Python runtime: $UV_MANAGED_PY"
            UV_MANAGED_ROOT="$(dirname "$(dirname "$UV_MANAGED_PY")")"
            mkdir -p "$SERVER_ENV_DIR"
            cp -a "$UV_MANAGED_ROOT/." "$SERVER_ENV_DIR/"
          elif [ "${{ matrix.os_name }}" == "windows" ]; then
            uv python install 3.12
            UV_MANAGED_PY="$(uv python find --managed-python --resolve-links 3.12)"
            echo "Using uv-managed Python runtime: $UV_MANAGED_PY"
            case "$UV_MANAGED_PY" in
              */Scripts/python.exe)
                UV_MANAGED_ROOT="$(dirname "$(dirname "$UV_MANAGED_PY")")"
                ;;
              *)
                UV_MANAGED_ROOT="$(dirname "$UV_MANAGED_PY")"
                ;;
            esac
            mkdir -p "$SERVER_ENV_DIR"
            cp -a "$UV_MANAGED_ROOT/." "$SERVER_ENV_DIR/"
            if [ -f "$SERVER_ENV_DIR/pyvenv.cfg" ]; then
              echo "Error: Windows bundle unexpectedly contains pyvenv.cfg (expected standalone interpreter copy, not a venv)"
              cat "$SERVER_ENV_DIR/pyvenv.cfg"
              exit 1
            fi
          else
            uv venv --python 3.12 --relocatable "$SERVER_ENV_DIR"
          fi

          if [ "${{ matrix.os_name }}" == "windows" ]; then
            if [ -f "$SERVER_ENV_DIR/Scripts/python.exe" ]; then
              PY_EXE="$SERVER_ENV_DIR/Scripts/python.exe"
            else
              PY_EXE="$SERVER_ENV_DIR/python.exe"
            fi
          elif [ "${{ matrix.os_name }}" == "macos" ]; then
            PY_EXE="$SERVER_ENV_DIR/bin/python3.12"
          else
            PY_EXE="$SERVER_ENV_DIR/bin/python"
          fi

          # Validate bundled libpython linkage in copied standalone runtime.
          if [ "${{ matrix.os_name }}" == "macos" ]; then
            LIBPY_REF="$(otool -L "$PY_EXE" | awk '/libpython[0-9.]+\.dylib/{print $1; exit}')"
            if [ -n "${LIBPY_REF}" ]; then
              LIBPY_NAME="$(basename "${LIBPY_REF}")"
              if [ ! -f "$SERVER_ENV_DIR/lib/${LIBPY_NAME}" ]; then
                echo "Error: bundled libpython missing at $SERVER_ENV_DIR/lib/${LIBPY_NAME}"
                exit 1
              fi
              for PY_BIN in "$SERVER_ENV_DIR/bin/python" "$SERVER_ENV_DIR/bin/python3" "$SERVER_ENV_DIR/bin/python3.12"; do
                if [ -f "${PY_BIN}" ]; then
                  install_name_tool -change "${LIBPY_REF}" "@executable_path/../lib/${LIBPY_NAME}" "${PY_BIN}" 2>/dev/null || true
                fi
              done
              if ! otool -L "$PY_EXE" | grep -F -q "@executable_path/../lib/${LIBPY_NAME}"; then
                echo "Error: packaged python is not linked to bundled libpython at env/lib/${LIBPY_NAME}"
                otool -L "$PY_EXE"
                exit 1
              fi
              echo "Validated bundled libpython dylib: ${LIBPY_NAME}"
            else
              echo "No libpython dylib dependency detected; skipping dylib bundle."
            fi
          fi

          # Fast-fail on macOS before expensive installs if the relocatable
          # venv still points to a runner-local Framework Python.
          if [ "${{ matrix.os_name }}" == "macos" ]; then
            echo "Validating packaged python linkage..."
            if otool -L "$PY_EXE" | grep -E -q '/Library/Frameworks/Python\.framework/Versions/.+/Python'; then
              echo "Error: packaged python is linked to /Library/Frameworks/Python.framework"
              otool -L "$PY_EXE"
              exit 1
            fi
          fi

          # Resolve runtime + test deps from the project's uv.lock for reproducibility.
          # Runtime deps (no dev group) → bundled into the artifact.
          uv export --project server --no-dev --no-emit-project --frozen --output-file "$RUNNER_TEMP/runtime-reqs.txt"
          # Test deps (dev group) → installed into the same env so we can run the
          # test suite against the bundled interpreter before packaging.
          uv export --project server --only-group dev --no-emit-project --frozen --output-file "$RUNNER_TEMP/test-reqs.txt"

          # macOS / Windows: copied-out standalone interpreters (not venvs).
          # `uv pip install --python <path>` is uv's intended API for installing
          # into an external interpreter; the higher-level `uv sync` only operates
          # on a project venv. `--break-system-packages` is required because
          # standalone CPython is marked externally-managed.
          # Linux: the env is a real `uv venv`, so we can sync directly via
          # UV_PROJECT_ENVIRONMENT, which is fully lockfile-driven.
          if [ "${{ matrix.os_name }}" == "macos" ] || [ "${{ matrix.os_name }}" == "windows" ]; then
            uv pip install --python "$PY_EXE" --break-system-packages -r "$RUNNER_TEMP/runtime-reqs.txt"
            uv pip install --python "$PY_EXE" --break-system-packages -r "$RUNNER_TEMP/test-reqs.txt"
          else
            UV_PROJECT_ENVIRONMENT="$SERVER_ENV_DIR" uv sync --project server --frozen --all-groups
          fi

          # Windows ships CPU-only (config.py hardcodes TORCH_DEVICE="cpu").
          # Default wheel bundles ~600MB of CUDA runtime we never use; replace with the
          # CPU-only build at the same version we just installed (read from the lockfile
          # to avoid drift).
          if [ "${{ matrix.os_name }}" == "windows" ]; then
            echo "Replacing CUDA torch with CPU-only build..."
            TORCH_VERSION=$(grep -E "^torch==" "$RUNNER_TEMP/runtime-reqs.txt" | head -1 | sed 's/^torch==//; s/[ ;].*//')
            TORCHVISION_VERSION=$(grep -E "^torchvision==" "$RUNNER_TEMP/runtime-reqs.txt" | head -1 | sed 's/^torchvision==//; s/[ ;].*//')
            echo "Using CPU-only torch ${TORCH_VERSION} and torchvision ${TORCHVISION_VERSION}"
            uv pip install --python "$PY_EXE" --break-system-packages \
              "torch==${TORCH_VERSION}+cpu" "torchvision==${TORCHVISION_VERSION}+cpu" \
              --index-url https://download.pytorch.org/whl/cpu \
              --reinstall --no-deps
          fi

          "$PY_EXE" -c "import torch, torch.testing; print('torch ok', torch.__version__)"
          uv pip check --python "$PY_EXE"
          "$PY_EXE" -c "import torch, torchvision, timm, open_clip; cfg = open_clip.get_model_config('ViT-SO400M-16-SigLIP2-384'); assert cfg and cfg.get('vision_cfg', {}).get('timm_model_name'); print('ml import contract ok', torch.__version__, torchvision.__version__, timm.__version__)"
          "$PY_EXE" -c "import torch, torchvision; from torchvision.ops import nms; b=torch.tensor([[0.,0.,1.,1.],[0.,0.,2.,2.]], dtype=torch.float32); s=torch.tensor([0.9,0.8], dtype=torch.float32); print('torchvision nms op ok', nms(b, s, 0.5).tolist())"

          echo "Running unit tests with pytest..."
          if [ "${{ matrix.os_name }}" == "windows" ]; then
            export PYTHONPATH="server;server/src"
          else
            export PYTHONPATH="server:server/src"
          fi
          "$PY_EXE" -m pytest server/test/ -v

          echo "Copying backend source files..."
          cp -r server/src "$SERVER_APP_DIR/"

          if [ "${{ matrix.os_name }}" == "windows" ]; then
            if [ -f "$SERVER_ENV_DIR/Scripts/python.exe" ]; then
              WIN_PYW_REL='env\Scripts\pythonw.exe'
            else
              WIN_PYW_REL='env\pythonw.exe'
            fi
            {
              echo '@echo off'
              echo 'setlocal'
              echo 'set "SCRIPT_DIR=%~dp0"'
              echo 'set "KMP_DUPLICATE_LIB_OK=TRUE"'
              echo 'set "PYTHONPATH=%SCRIPT_DIR%app;%PYTHONPATH%"'
              echo 'rem Use start /b with pythonw.exe to run invisibly and allow the batch script to exit immediately.'
              echo "start \"\" /b \"%SCRIPT_DIR%${WIN_PYW_REL}\" \"%SCRIPT_DIR%app\src\geniusai_server.py\" %*"
            } > "$SERVER_DIR/lrgenius-server.cmd"
          else
            {
              echo '#!/usr/bin/env bash'
              echo 'set -euo pipefail'
              echo 'SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"'
              echo 'export KMP_DUPLICATE_LIB_OK=TRUE'
              echo 'export PYTHONHOME="$SCRIPT_DIR/env"'
              echo 'export PYTHONNOUSERSITE=1'
              echo 'export PYTHONPATH="$SCRIPT_DIR/app:${PYTHONPATH:-}"'
              echo 'export DYLD_LIBRARY_PATH="$SCRIPT_DIR/env/lib:$SCRIPT_DIR/env/lib/python3.12/site-packages/torch/lib:${DYLD_LIBRARY_PATH:-}"'
              echo ''
              echo '# macOS release ZIPs can lose execute bits and carry quarantine.'
              echo 'if [ "$(uname -s)" = "Darwin" ]; then'
              echo '  chmod +x "$SCRIPT_DIR/env/bin/python" "$SCRIPT_DIR/env/bin/python3" "$SCRIPT_DIR/env/bin/python3.12" 2>/dev/null || true'
              echo '  if command -v xattr >/dev/null 2>&1; then'
              echo '    xattr -dr com.apple.quarantine "$SCRIPT_DIR/env" 2>/dev/null || true'
              echo '    xattr -d com.apple.quarantine "$SCRIPT_DIR" 2>/dev/null || true'
              echo '  fi'
              echo 'fi'
              echo 'exec "$SCRIPT_DIR/env/bin/python" "$SCRIPT_DIR/app/src/geniusai_server.py" "$@"'
            } > "$SERVER_DIR/lrgenius-server"
            chmod +x "$SERVER_DIR/lrgenius-server"
          fi

          # GitHub artifact upload/download can lose symlink semantics.
          # Flatten symlinks inside the packaged macOS runtime to keep it portable.
          if [ "${{ matrix.os_name }}" == "macos" ]; then
            echo "Normalizing macOS runtime (dereferencing symlinks)..."
            RESOLVED_ENV="${SERVER_ENV_DIR}.resolved"
            mkdir -p "$RESOLVED_ENV"
            rsync -aL "$SERVER_ENV_DIR/" "$RESOLVED_ENV/"
            rm -rf "$SERVER_ENV_DIR"
            mv "$RESOLVED_ENV" "$SERVER_ENV_DIR"
            PY_EXE="$SERVER_ENV_DIR/bin/python3.12"
            "$PY_EXE" -c "import torch, torchvision; from torchvision.ops import nms; b=torch.tensor([[0.,0.,1.,1.],[0.,0.,2.,2.]], dtype=torch.float32); s=torch.tensor([0.9,0.8], dtype=torch.float32); print('post-normalize nms ok', nms(b, s, 0.5).tolist())"
          fi
          
      - name: Prepare plugin files
        shell: bash
        run: |
          BUILD_DIR="build"
          PLUGIN_DIR="$BUILD_DIR/LrGeniusAI.lrplugin"
          
          mkdir -p $PLUGIN_DIR
          
          echo "Copying plugin files..."
          cp plugin/LrGeniusAI.lrdevplugin/*.lua $PLUGIN_DIR/
          cp plugin/LrGeniusAI.lrdevplugin/TranslatedStrings_*.txt $PLUGIN_DIR/

          if [ "${{ matrix.os_name }}" == "macos" ]; then
            if [ -f "$BUILD_DIR/lrgenius-server/lrgenius-server" ]; then
              echo "Setting executable permissions for macOS server binary..."
              chmod +x $BUILD_DIR/lrgenius-server/lrgenius-server
            fi
          fi

      - name: Shrink build before upload
        shell: bash
        run: |
          set -euo pipefail
          ENV_DIR="build/lrgenius-server/env"
          echo "=== Size before cleanup ==="
          du -sh build/ || true

          find "$ENV_DIR" -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find "$ENV_DIR" -name "*.pyc" -delete 2>/dev/null || true
          # Keep .dist-info dirs: entry_points.txt is needed at runtime
          # (opentelemetry discovers its context backend via entry_points).
          # Strip only the large bookkeeping files inside each .dist-info.
          find "$ENV_DIR" -path "*.dist-info/RECORD" -delete 2>/dev/null || true
          find "$ENV_DIR" -path "*.dist-info/INSTALLER" -delete 2>/dev/null || true
          find "$ENV_DIR" -path "*.dist-info/REQUESTED" -delete 2>/dev/null || true
          find "$ENV_DIR" -path "*.dist-info/LICENSE*" -delete 2>/dev/null || true
          find "$ENV_DIR" -path "*.dist-info/NOTICE*" -delete 2>/dev/null || true
          find "$ENV_DIR" -type d -name "*.egg-info" -exec rm -rf {} + 2>/dev/null || true

          find "$ENV_DIR" -type d -name "tests" -path "*/site-packages/*/tests" -exec rm -rf {} + 2>/dev/null || true
          find "$ENV_DIR" -type d -name "test"  -path "*/site-packages/*/test"  -exec rm -rf {} + 2>/dev/null || true

          if [ "${{ matrix.os_name }}" == "windows" ]; then
            find "$ENV_DIR" -name "*.pdb" -delete 2>/dev/null || true
          fi

          echo "=== Size after cleanup ==="
          du -sh build/ || true

      - name: Build macOS installer
        if: matrix.os_name == 'macos'
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "Building macOS .pkg installer..."
          chmod +x installers/macos/build_pkg.sh
          ./installers/macos/build_pkg.sh "$VERSION" "${{ matrix.arch }}"

      - name: Build Windows installer
        if: matrix.os_name == 'windows'
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "Building Windows .exe installer with Inno Setup..."
          # Inno Setup is pre-installed on windows-latest
          ISCC="/c/Program Files (x86)/Inno Setup 6/ISCC.exe"
          MSYS_NO_PATHCONV=1 "$ISCC" /DAppVersion="$VERSION" /O"installers/windows/Output" installers/windows/setup.iss
          # Match the installer even if the OutputDir logic in the .iss varies
          find . -name "*.exe" -path "*/Output/*" -exec mv {} . \; -quit || mv installers/windows/Output/*.exe .


      - name: Smoke test packaged backend and log cold start
        shell: bash
        run: |
          set -euo pipefail
          DB_DIR="$RUNNER_TEMP/lrgenius-smoke-db"
          DB_PATH="$DB_DIR/lrgenius.db"
          LOG_PATH="$DB_DIR/lrgenius-server.log"
          SMOKE_STDOUT="$DB_DIR/smoke-backend.out"
          mkdir -p "$DB_DIR"
          URL="http://127.0.0.1:19819/ping"
          START_TS=$(python -c "import time; print(time.time())")

          if [ "${{ matrix.os_name }}" == "windows" ]; then
            DB_PATH_WIN=$(cygpath -w "$DB_PATH")
            # Use console python.exe directly for smoke test so it remains synchronous and trackable
            if [ -f "build/lrgenius-server/env/Scripts/python.exe" ]; then
              PY_EXE_WIN=$(cygpath -w "$GITHUB_WORKSPACE/build/lrgenius-server/env/Scripts/python.exe")
            else
              PY_EXE_WIN=$(cygpath -w "$GITHUB_WORKSPACE/build/lrgenius-server/env/python.exe")
            fi
            SERVER_PY_WIN=$(cygpath -w "$GITHUB_WORKSPACE/build/lrgenius-server/app/src/geniusai_server.py")
            SMOKE_LAUNCH_CMD="$DB_DIR/smoke-launch.cmd"
            {
              echo '@echo off'
              echo "\"$PY_EXE_WIN\" \"$SERVER_PY_WIN\" --db-path \"$DB_PATH_WIN\""
            } > "$SMOKE_LAUNCH_CMD"
            SMOKE_LAUNCH_CMD_WIN=$(cygpath -w "$SMOKE_LAUNCH_CMD")
            cmd.exe //c "$SMOKE_LAUNCH_CMD_WIN" >"$SMOKE_STDOUT" 2>&1 &
            BACKEND_PID=$!
          else
            "build/lrgenius-server/lrgenius-server" --db-path "$DB_PATH" >"$SMOKE_STDOUT" 2>&1 &
            BACKEND_PID=$!
          fi

          READY=0
          for i in $(seq 1 600); do
            if curl -sf "$URL" | grep -q "pong"; then
              READY=1
              break
            fi
            if [ -n "${BACKEND_PID:-}" ] && ! kill -0 "$BACKEND_PID" 2>/dev/null; then
              echo "Backend process exited early before /ping became ready."
              break
            fi
            if [ $((i % 120)) -eq 0 ]; then
              echo "Still waiting for backend readiness... (${i}/600)"
            fi
            sleep 0.5
          done

          if [ "$READY" -ne 1 ]; then
            echo "Backend smoke test failed: /ping did not return pong in time."
            if [ -f "$LOG_PATH" ]; then
              echo "---- backend log tail ----"
              tail -n 120 "$LOG_PATH" || true
              echo "--------------------------"
            else
              echo "Backend log file not found at $LOG_PATH"
            fi
            if [ -f "$SMOKE_STDOUT" ]; then
              echo "---- launcher stdout/stderr ----"
              tail -n 120 "$SMOKE_STDOUT" || true
              echo "--------------------------------"
            fi
            exit 1
          fi

          END_TS=$(python -c "import time; print(time.time())")
          COLD_START_SECONDS=$(python -c "import sys; print(f'{float(sys.argv[2]) - float(sys.argv[1]):.2f}')" "$START_TS" "$END_TS")
          echo "Measured cold start to /ping: ${COLD_START_SECONDS}s"

          if [ "${{ matrix.os_name }}" == "windows" ]; then
            if [ -f "$GITHUB_WORKSPACE/build/lrgenius-server/env/Scripts/python.exe" ]; then
              TEST_PY="$GITHUB_WORKSPACE/build/lrgenius-server/env/Scripts/python.exe"
            else
              TEST_PY="$GITHUB_WORKSPACE/build/lrgenius-server/env/python.exe"
            fi
          else
            TEST_PY="$GITHUB_WORKSPACE/build/lrgenius-server/env/bin/python"
          fi

          "$TEST_PY" "server/test/api_test_client.py" \
            --base-url "http://127.0.0.1:19819" \
            --iterations 120 \
            --timeout 5

          curl -sf -X POST "http://127.0.0.1:19819/shutdown" || true

      - name: Relocation import test
        shell: bash
        run: |
          set -euo pipefail
          RELOCATED="$RUNNER_TEMP/relocated-server"
          cp -a build/lrgenius-server "$RELOCATED"
          if [ "${{ matrix.os_name }}" == "windows" ]; then
            if [ -f "$RELOCATED/env/Scripts/python.exe" ]; then
              PY="$RELOCATED/env/Scripts/python.exe"
            else
              PY="$RELOCATED/env/python.exe"
            fi
          else
            PY="$RELOCATED/env/bin/python"
          fi
          export PYTHONPATH="$RELOCATED/app:${PYTHONPATH:-}"
          "$PY" -c "import torch, torchvision; print('relocation ok', torch.__version__, torchvision.__version__)"
          if [ "${{ matrix.os_name }}" == "macos" ]; then
            LIBPY_REF="$(otool -L "$PY" | awk '/libpython[0-9.]+\.dylib/{print $1; exit}')"
            if [ -n "${LIBPY_REF}" ]; then
              LIBPY_NAME="$(basename "${LIBPY_REF}")"
              test -f "$RELOCATED/env/lib/${LIBPY_NAME}"
            fi
          fi
          rm -rf "$RELOCATED"

      - name: Pack artifact payload
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT_DIR="artifact-payload"
          ARTIFACT_TAR="lrgenius-ai-${{ matrix.os_name }}-${{ matrix.arch }}.tar"
          mkdir -p "$ARTIFACT_DIR"
          tar -C build -cf "$ARTIFACT_DIR/$ARTIFACT_TAR" .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: lrgenius-ai-${{ matrix.os_name }}-${{ matrix.arch }}
          path: |
            artifact-payload/lrgenius-ai-${{ matrix.os_name }}-${{ matrix.arch }}.tar
            *.pkg
            *.exe
          retention-days: 1
          compression-level: 9

  build-plugin-only:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [validate-tag]
    runs-on: ubuntu-latest
    name: Build Plugin Only

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Update Info.lua with version and build date
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          REVISION=$(echo "$VERSION" | cut -d. -f3)
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          REVISION=${REVISION:-0}
          BUILD_DATE=$(date +%Y%m%d)
          INFO_LUA="plugin/LrGeniusAI.lrdevplugin/Info.lua"
          sed 's/Info.MAJOR = .*/Info.MAJOR = '"$MAJOR"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          sed 's/Info.MINOR = .*/Info.MINOR = '"$MINOR"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          sed 's/Info.REVISION = .*/Info.REVISION = '"$REVISION"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          sed 's/Info.BUILD = [0-9]*/build = '"$BUILD_DATE"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          echo "Updated Info.lua: MAJOR=$MAJOR MINOR=$MINOR REVISION=$REVISION build=$BUILD_DATE"

      - name: Prepare plugin-only files
        shell: bash
        run: |
          BUILD_DIR="build-plugin-only"
          mkdir -p "$BUILD_DIR"
          cp -r plugin/LrGeniusAI.lrdevplugin "$BUILD_DIR/"

      - name: Pack plugin-only artifact payload
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT_DIR="artifact-payload"
          ARTIFACT_TAR="lrgenius-ai-plugin-docker-backend.tar"
          mkdir -p "$ARTIFACT_DIR"
          tar -C build-plugin-only -cf "$ARTIFACT_DIR/$ARTIFACT_TAR" .

      - name: Upload plugin-only artifact
        uses: actions/upload-artifact@v6
        with:
          name: lrgenius-ai-plugin-docker-backend
          path: artifact-payload/lrgenius-ai-plugin-docker-backend.tar
          retention-days: 1

  build-docker-images:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [validate-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: x64
            docker_platform: linux/amd64
          - arch: aarch64
            docker_platform: linux/arm64

    name: Build Docker Image - ${{ matrix.arch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Same as build-and-release: bake release tag into version_info.py so /version and
      # /version/check match the plugin from the same tag. Without this, the image keeps
      # the repo's dev placeholder and users see plugin/server version mismatch.
      - name: Update backend version info from tag
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          BUILD_DATE=$(date +%Y%m%d)
          VERSION_FILE="server/src/version_info.py"
          cat > "$VERSION_FILE" <<EOF
          BACKEND_VERSION = "${VERSION}"
          BACKEND_RELEASE_TAG = "v${VERSION}"
          BACKEND_BUILD = ${BUILD_DATE}
          EOF
          echo "Updated backend version info: version=${VERSION} build=${BUILD_DATE}"

      - name: Prepare image name
        id: image-name
        shell: bash
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "registry_image=ghcr.io/${OWNER_LC}/lrgeniusai" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: ${{ matrix.docker_platform }}
          push: true
          tags: ${{ steps.image-name.outputs.registry_image }}:${{ github.ref_name }}-${{ matrix.arch }}
          cache-from: type=gha,scope=lrgeniusai-server-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=lrgeniusai-server-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
          provenance: false
          sbom: false
          # generate-summary: false

  # Combine per-arch pushes into one multi-arch :latest so `docker compose pull` works
  # with ghcr.io/.../lrgeniusai:latest (amd64 and arm64 clients resolve correctly).
  publish-docker-manifest:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-docker-images, create-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    name: Publish Docker latest manifest

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch latest
        shell: bash
        run: |
          set -euo pipefail
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMG="ghcr.io/${OWNER_LC}/lrgeniusai"
          TAG="${{ github.ref_name }}"
          docker buildx imagetools create \
            --tag "${IMG}:latest" \
            "${IMG}:${TAG}-x64" \
            "${IMG}:${TAG}-aarch64"
          
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-and-release, build-plugin-only]
    runs-on: ubuntu-latest
    name: Create Release
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: lrgenius-ai-*
          path: artifacts
      
      - name: Zip artifacts
        run: |
          VERSION=${{ github.ref_name }}
          
          cd artifacts

          for ARTIFACT_DIR in lrgenius-ai-windows-x64 lrgenius-ai-macos-arm64 lrgenius-ai-plugin-docker-backend; do
            if [ -d "$ARTIFACT_DIR" ]; then
              TAR_PATH="$(echo "$ARTIFACT_DIR"/*.tar)"
              if [ -f "$TAR_PATH" ]; then
                tar -xf "$TAR_PATH" -C "$ARTIFACT_DIR"
                rm -f "$TAR_PATH"
              fi
            fi
          done

          # actions/download-artifact normalizes permissions, so restore macOS executable bits before zipping.
          if [ -d "lrgenius-ai-macos-arm64" ]; then
            chmod +x lrgenius-ai-macos-arm64/lrgenius-server/lrgenius-server || true
            chmod +x lrgenius-ai-macos-arm64/lrgenius-server/env/bin/* || true
          fi
          
          if [ -d "lrgenius-ai-windows-x64" ]; then
            cd lrgenius-ai-windows-x64
            zip -r ../LrGeniusAI-windows-x64-${VERSION}.zip .
            cd ..
          fi

          if [ -d "lrgenius-ai-macos-arm64" ]; then
            cd lrgenius-ai-macos-arm64
            zip -r ../LrGeniusAI-macos-arm64-${VERSION}.zip .
            cd ..
          fi

          if [ -d "lrgenius-ai-plugin-docker-backend" ]; then
            cd lrgenius-ai-plugin-docker-backend
            zip -r ../LrGeniusAI-plugin-docker-backend-${VERSION}.zip .
            cd ..
          fi
          
          cd ..

      - name: Set release metadata
        id: release-meta
        run: |
          VERSION="${{ github.ref_name }}"
          echo "release_name=Release ${VERSION}" >> $GITHUB_OUTPUT

      - name: Generate code-only update manifest
        run: |
          VERSION="${{ github.ref_name }}"
          BREAKING_FLAG=""
          if [[ "${{ github.event.inputs.breaking_changes }}" == "true" ]]; then
            BREAKING_FLAG="--breaking"
          fi
          python3 scripts/generate_update_manifest.py \
            --version "${VERSION}" \
            --repo "${{ github.repository }}" \
            --output "update-manifest-${VERSION}.json" \
            ${BREAKING_FLAG}
          echo "Generated update-manifest-${VERSION}.json"
          cat "update-manifest-${VERSION}.json" | python3 -c "import sys,json; m=json.load(sys.stdin); print(f'Manifest: {m[\"file_counts\"][\"plugin\"]} plugin files, {m[\"file_counts\"][\"backend_src\"]} backend files, {m[\"total_size_bytes\"]//1024} KB total, breaking={m[\"breaking_changes\"]}')"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.release-meta.outputs.release_name }}
          files: |
            artifacts/LrGeniusAI-plugin-docker-backend-${{ github.ref_name }}.zip
            artifacts/lrgenius-ai-macos-arm64/*.pkg
            artifacts/lrgenius-ai-windows-x64/*.exe
            update-manifest-${{ github.ref_name }}.json
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
